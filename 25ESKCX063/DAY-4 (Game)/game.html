<!DOCTYPE html>
<html>
<head>
    <title>Fruit Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container text-center mt-3">

    <h2>Fruit Game</h2>

    <h4>
        Apple : <span id="apple">0</span>
        &nbsp;&nbsp;
        Banana : <span id="banana">0</span>
    </h4>

</div>

<img src="A.jpeg"
     width="150"
     class="position-absolute"
     onclick="move(this,'apple')">

<img src="b.jpeg"
     width="150"
     class="position-absolute"
     onclick="move(this,'banana')">

<script>

let apple = 0;
let banana = 0;

function move(img,type){

    if(type=="apple"){
        apple++;
        document.getElementById("apple").innerHTML = apple;
    }
    else{
        banana++;
        document.getElementById("banana").innerHTML = banana;
    }

    img.style.left = Math.random()*800 + "px";
    img.style.top = Math.random()*400 + "px";
}

</script>

</body>
</html>
