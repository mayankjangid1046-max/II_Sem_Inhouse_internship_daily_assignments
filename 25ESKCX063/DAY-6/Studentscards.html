<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-light">

<div class="container py-5">
    <h2 class="text-center mb-4">Student Records</h2>

    <input
        type="text"
        id="search"
        class="form-control mb-4"
        placeholder="Search Student..."
    >

    <div id="container" class="row g-4"></div>
</div>

<script>

const students = [
    {
        name: "Mayank Jangid",
        branch: "CSE(DS)",
        cgpa: 8.7
    },
    {
        name: "Mohit Sharma",
        branch: "CSE(DS)",
        cgpa: 8.7
    },
    {
        name: "Hardik Gupta",
        branch: "CSE(DS)",
        cgpa: 8.7
    },
];

function displayStudents(data) {

    let html = "";
 

    for (let i = 0; i < data.length; i++) {

        html += `
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h4>${data[i].name}</h4>
                    <p><b>Branch:</b> ${data[i].branch}</p>
                    <p><b>CGPA:</b> ${data[i].cgpa}</p>
                </div>
            </div>
        </div>`;
    }

    $("#container").html(html);
}

displayStudents(students);

$("#search").keyup(function () {

    let text = $("#search").val().toLowerCase();
    let result = [];

    for (let i = 0; i < students.length; i++) {

        if (
            students[i].name.toLowerCase().includes(text) ||
            students[i].branch.toLowerCase().includes(text)
        ) {
            result.push(students[i]);
        }
    }

    displayStudents(result);
});
  document.getElementById("json").innerHTML=JSON.stringify(students)

</script>

</body>
</html>
