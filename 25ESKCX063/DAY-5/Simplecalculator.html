<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simplecalc</title>
</head>
<body>
     <form> 
          <input type="text" id="number1" placeholder="enter first number"  />
           <input type="text" id="number2" placeholder="enter second number"  />
         <select id="operator">  
           <option value="+">+</option>
           <option value="-">-</option>
           <option value="*">*</option>
           <option value="%">%</option>
         </select>
         <button type="button" id="calculate">Calculate</button>
         </form>
         <div id="result"></div>
         <script>   
            function performarithmeticoperation(){
                const number1 = parseFloat(document.getElementById("number1").value);
                const number2 = parseFloat(document.getElementById("number2").value);
                const operator = document.getElementById("operator").value;
                let result = '';

                if (Number.isNaN(number1) || Number.isNaN(number2)) {
                    result = 'Enter two valid numbers';
                } else {
                    switch(operator){
                        case '+':
                            result = number1 + number2;
                            break;
                        case '-':
                            result = number1 - number2;
                            break;
                        case '*':
                            result = number1 * number2;
                            break;
                        case '%':
                            result = number1 % number2;
                            break;
                    }
                }

                document.getElementById('result').innerHTML = `Result: ${result}`;
            }

            document.getElementById('calculate').
            addEventListener('click', performarithmeticoperation);
      </script>
    
   </body>
</html>
